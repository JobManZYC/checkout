server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.13.128:3306/pos_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: coen
    password: Coen1234..
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.scan.pos.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境务必关闭 StdOutImpl，防止密码等敏感信息泄漏到日志
    # 开发调试时可临时取消注释：log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  redis:
    host: 192.168.13.128
    port: 6379
    password: 123456
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

logging:
  level:
    com.scan.pos: debug
